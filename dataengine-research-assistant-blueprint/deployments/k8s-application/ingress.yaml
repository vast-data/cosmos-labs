# Research Assistant - Ingress
# Apply with: envsubst < ingress.yaml | kubectl apply -f - -n <namespace>

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: research-assistant-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: agent.${CLUSTER_NAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: research-assistant
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: research-assistant-gui-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${GUI_HOST}
      secretName: ${TLS_SECRET}
  rules:
    - host: ${GUI_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: research-assistant-gui
                port:
                  number: 80
