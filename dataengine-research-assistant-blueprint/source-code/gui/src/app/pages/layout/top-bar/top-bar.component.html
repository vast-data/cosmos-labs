<header
  class="top-bar"
  role="banner"
>
  <div class="top-bar-content">
    <div class="left-section">
      <button
        type="button"
        aria-label="Open menu"
        class="menu-button"
        (click)="toggleSidebar()"
      >
        <span class="sr-only">Open menu</span>
        <mat-icon svgIcon="sidepanel" class="menu-icon"></mat-icon>
      </button>
      @if (!sidebarOpen()) {
        <a
          routerLink="/chat/new"
          class="new-chat-button"
          aria-label="New conversation"
          matTooltip="New conversation"
          matTooltipPosition="below"
          (click)="onNewChat()"
        >
          <mat-icon svgIcon="new-chat"></mat-icon>
        </a>
      }
      <a routerLink="/chat/new" class="logo-link" (click)="onLogoClick()">
        <img src="/assets/images/vast-logo.png" alt="Vast" class="logo" />
      </a>
    </div>

    <div class="right-section">
      <a routerLink="/blueprint"
         class="blueprint-button"
         aria-label="Architecture Blueprint"
         matTooltip="Architecture Blueprint"
         matTooltipPosition="below">
        <mat-icon>architecture</mat-icon>
      </a>
      <button
        class="settings-button"
        [matMenuTriggerFor]="settingsMenu"
        aria-label="Settings"
        matTooltip="Settings"
        matTooltipPosition="below">
        <mat-icon>settings</mat-icon>
      </button>
      <mat-menu #settingsMenu="matMenu" class="settings-menu">
        <button mat-menu-item (click)="openSystemPrompt()">
          <mat-icon [class.active-prompt]="promptService.hasCustomPrompt()">psychology</mat-icon>
          <span>System Prompt</span>
          @if (promptService.hasCustomPrompt()) {
            <span class="custom-badge">custom</span>
          }
        </button>
      </mat-menu>
      <app-user-logo [withMenu]="true" [size]="40"></app-user-logo>
    </div>
  </div>
</header>
