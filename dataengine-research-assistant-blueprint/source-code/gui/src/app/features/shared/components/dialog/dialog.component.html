<div
  class="dialog-container"
  [attr.aria-labelledby]="config?.id + '-title'"
  [attr.aria-describedby]="config?.id + '-content'"
  [ngStyle]="getAriaAttributes()">

  <!-- Backdrop -->
  <div
    *ngIf="config?.hasBackdrop !== false"
    class="dialog-backdrop"
    [ngClass]="getBackdropClasses()"
    (click)="onBackdropClick($event)">
  </div>

  <!-- Dialog Panel -->
  <div
    class="dialog-panel"
    [ngClass]="getPanelClasses()"
    [ngStyle]="getPanelStyles()"
    role="dialog"
    [attr.aria-modal]="config?.hasBackdrop !== false"
    [attr.aria-labelledby]="config?.id + '-title'"
    [attr.aria-describedby]="config?.id + '-content'">

    <!-- Content Container -->
    <div
      #contentContainer
      class="dialog-content"
      id="{{config?.id}}-content">
    </div>
  </div>
</div>
