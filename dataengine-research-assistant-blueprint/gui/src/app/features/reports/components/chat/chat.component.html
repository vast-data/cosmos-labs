<form class="chat" [class.chat_transparent]="transparentMode" [class.focused]="focused" (ngSubmit)="onSubmit()">
    <!-- System Prompt Expandable Section -->
    @if (isSystemPromptExpanded()) {
        <div class="chat__system-prompt">
            <div class="chat__system-prompt-header">
                <span class="chat__system-prompt-title">
                    <mat-icon>psychology</mat-icon>
                    System Prompt
                </span>
                <div class="chat__system-prompt-actions">
                    @if (hasCustomSystemPrompt()) {
                        <button type="button" class="chat__reset-btn" (click)="resetSystemPrompt()" matTooltip="Reset to default">
                            <mat-icon>refresh</mat-icon>
                        </button>
                    }
                    <button type="button" class="chat__collapse-btn" (click)="toggleSystemPrompt()">
                        <mat-icon>expand_less</mat-icon>
                    </button>
                </div>
            </div>
            <textarea
                class="chat__system-prompt-textarea"
                [(ngModel)]="customSystemPrompt"
                [ngModelOptions]="{standalone: true}"
                placeholder="Enter system prompt..."
                rows="6"></textarea>
            @if (hasCustomSystemPrompt()) {
                <div class="chat__system-prompt-badge">Custom prompt active</div>
            }
        </div>
    }

    <div class="chat__input">
        <textarea
            (keydown.enter)="$event.preventDefault(); $event.stopPropagation(); onSubmit()"
            (focusin)="focused = true"
            (focusout)="focused = false" 
            matInput
            cdkTextareaAutosize
            [cdkAutosizeMinRows]="2"
            [cdkAutosizeMaxRows]="5"
            placeholder="Reply to your agent..." 
            [(ngModel)]="message"
            [ngModelOptions]="{standalone: true}"></textarea>
    </div>
    <div class="chat__actions">
        <div class="chat__settings-actions">
            <app-collection-selector (collectionSelected)="onCollectionSelected($event)"></app-collection-selector>
            <button 
                type="button" 
                class="chat__toggle"
                [class.chat__toggle--active]="isInternetSearchEnabled()"
                (click)="toggleInternetSearch()"
                [attr.aria-pressed]="isInternetSearchEnabled()"
                aria-label="Toggle internet search"
                matTooltip="When enabled, the model will search the internet for additional information">
                <mat-icon>language</mat-icon>
                <span class="chat__toggle-text">Internet Search</span>
            </button>
            <button 
                type="button" 
                class="chat__toggle"
                [class.chat__toggle--active]="isSystemPromptExpanded() || hasCustomSystemPrompt()"
                (click)="toggleSystemPrompt()"
                aria-label="Toggle system prompt editor"
                matTooltip="Edit the system prompt/instructions for the AI">
                <mat-icon>psychology</mat-icon>
                <span class="chat__toggle-text">System Prompt</span>
            </button>
        </div>
       
        <div class="chat__main-actions">
            <button class="chat__send button-icon-s">
                <mat-icon svgIcon="send"></mat-icon>
            </button>
        </div>
    </div>
</form>
