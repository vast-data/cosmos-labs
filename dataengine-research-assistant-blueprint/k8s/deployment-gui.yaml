# Research Assistant GUI - Deployment
# Apply with: kubectl apply -f deployment-gui.yaml -n <namespace>

apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-assistant-gui
  labels:
    app: research-assistant-gui
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: research-assistant-gui
      component: frontend
  template:
    metadata:
      labels:
        app: research-assistant-gui
        component: frontend
    spec:
      containers:
      - name: research-assistant-gui
        # Image is set via envsubst during installation
        image: docker.io/vastdatasolutions/research-assistant-gui:v1
        imagePullPolicy: Always
        
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        
        # Resource limits
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      # Restart policy
      restartPolicy: Always

