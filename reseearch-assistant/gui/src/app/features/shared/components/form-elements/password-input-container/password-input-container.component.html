<ng-content></ng-content>
<button tabindex="-1" class="eye-button" [style.top]="!isPasswordVisible ? '10px' : '8px'" type="button" (click)="onToggle()">
  @if (!isPasswordVisible) {
    <app-svg-icon [iconURL]="'assets/icons/icon_show_no_frame'" [width]="'1rem'" [height]="'1rem'"></app-svg-icon>
  } @else {
    <app-svg-icon [iconURL]="'assets/icons/icon_hide_no_frame'" [width]="'1rem'" [height]="'1rem'"></app-svg-icon>
  }
</button>
